name: Deploy Hugo to Azure Static Website

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # OIDC 認証に必要

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify --gc

      - name: Azure Login（OIDC）
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob delete-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --source '$web' \
              --auth-mode login

            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --source ./public \
              --destination '$web' \
              --auth-mode login \
              --overwrite

# =============================================================
# GitHub Secrets に登録が必要な値:
#   AZURE_CLIENT_ID       : サービスプリンシパルのクライアントID
#   AZURE_TENANT_ID       : Azure テナントID
#   AZURE_SUBSCRIPTION_ID : Azure サブスクリプションID
#   AZURE_STORAGE_ACCOUNT : ストレージアカウント名
#
# Azure Portal でサービスプリンシパルを作成し、
# Storage Blob Data Contributor ロールを付与してください。
# =============================================================