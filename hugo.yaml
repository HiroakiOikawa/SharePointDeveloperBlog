baseURL: "https://m365dev.orivers.jp/"
languageCode: "ja"
title: "Microsoft 365 Developer"
theme: "PaperMod"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

markup:
  highlight:
    noClasses: false
    lineNos: true
    lineNumbersInTable: true
    style: "monokai"
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tag: tags
  category: categories
  series: series

outputs:
  home:
    - HTML
    - RSS
    - JSON # 検索機能に必要

params:
  env: production
  author: "Hiroaki Oikawa"
  description: "Teams アドイン、Office アドイン、SharePoint Frameworkなど、Microsoft 365 開発に関する技術情報を発信しています。"
  keywords:
    [
      "Microsoft 365",
      "SharePoint",
      "Teams",
      "Office",
      "開発",
      "技術情報",
      "Azure",
      "ソフトウェア開発",
    ]
  assets:
    favicon: "/favicon.svg"

  defaultTheme: auto
  disableThemeToggle: false

  homeInfoParams:
    Title: "Microsoft 365 Developer ブログ (非公式)"
    Content: |
      これまで **SharePoint Developer** として活動してきましたが、Microsoft 365 開発全般に関する情報を発信するために、タイトルを変更しました。
      <br/><br/>
      また、使用するブログツールも変えたため、これまでのブログ記事は移行が必要になりました。
      移行は順次行うので過去記事を欲している方は申し訳ございませんがしばしお待ちください。。
      <br/><br/>
      このブログでは、Teams アドイン、Office アドイン、SharePoint Framework など、Microsoft 365 開発に関する技術情報を個人的に発信しています。
      Microsoft 365 開発に関する実践的な情報を共有することで、開発者の皆さんのお役に立てれば幸いです。

  socialIcons:
    - name: github
      url: "https://github.com/HiroakiOikawa"
    - name: twitter
      url: "https://twitter.com/HiroakiOikawa"
    - name: rss
      url: "/index.xml"

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  UseHugoToc: true
  showtoc: true
  tocopen: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - identifier: posts
      name: 📝 記事一覧
      url: /posts/
      weight: 10
    - identifier: tags
      name: 🏷️ タグ
      url: /tags/
      weight: 20
    - identifier: categories
      name: 📂 カテゴリ
      url: /categories/
      weight: 30
    - identifier: archives
      name: 📚 アーカイブ
      url: /archives/
      weight: 40
    - identifier: search
      name: 🔍 検索
      url: /search/
      weight: 50
    - identifier: about
      name: 👤 About
      url: /about/
      weight: 60
