{{- if site.Params.adsense.enabled -}}
<div class="widget--adsense-sidebar widget">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ site.Params.adsense.clientId }}"
       data-ad-slot="{{ site.Params.adsense.sidebarAdSlot }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>
{{- end -}}
