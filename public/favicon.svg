<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Code brackets -->
  <text x="0" y="24" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#e0e0e0">&lt;</text>
  <text x="20" y="24" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#e0e0e0">&gt;</text>

  <!-- Slash in the middle -->
  <line x1="18" y1="7" x2="12" y2="25" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
</svg>
